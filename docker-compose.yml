services:
  database:
    container_name: sports-calendar-db
    image: "postgres:18.3"
    ports:
      - 5432:5432
    env_file:
      - .env
    networks:
      - backend-network
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: sports-calendar-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: ["/main"]
    depends_on:
      database:
          condition: service_healthy
    networks:
      - backend-network

  migrations:
    build: .
    container_name: sports-calendar-migrations
    env_file:
      - .env
    command: ["/migrate", "-up"]
    depends_on:
      database:
        condition: service_healthy
    profiles: ["utils"]
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres-data: