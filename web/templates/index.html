<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Event Calendar</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/index.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">Sports Event Calendar</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Sports</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-container">
        <section class="page-header">
            <h1>Upcoming Events</h1>
            <p>Browse scheduled sports matches by date.</p>
            <p>Click on an event to view details.</p>
        </section>
        <div id="filters">
            <section id="sport-filter-section"></section>
            <section id="date-filter-section">
                <label for="date-from">Date from:</label>
                <input type="date" id="date-from">
                <label for="date-to">Date to:</label>
                <input type="date" id="date-to">
            </section>
            <button type="button" onclick="clearFilters()">Clear filters</button>
        </div>


        <section id="events-list" class="events-list">
            <p>Loading events...</p>
        </section>
        <div id="pagination" class="pagination"></div>
    </main>
</body>
</html>
