<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Event Calendar</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/index.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <div class="nav-brand">Sports Event Calendar</div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Events</a></li>
                <li><a href="#">Sports</a></li>
                <li><a href="#">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-container">
        <section class="page-header">
            <h1>Upcoming Events</h1>
            <p>Browse scheduled sports matches by date.</p>
            <p>Click on an event to view details.</p>
        </section>

        <section id="create-event-section" class="create-event-section">
            <button type="button" id="toggle-event-form-btn">Add event</button>

            <form id="create-event-form" class="event-form" hidden>
                <div class="form-row">
                    <label for="sport-id">Sport</label>
                    <select id="sport-id" name="sport_id" required></select>
                </div>

                <div class="form-row">
                    <label for="competition-id">Competition</label>
                    <select id="competition-id" name="competition_id">
                        <option value="">No competition</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="venue-id">Venue</label>
                    <select id="venue-id" name="venue_id">
                        <option value="">No venue</option>
                    </select>
                </div>

                <div class="form-row">
                    <label for="home-team-id">Home team</label>
                    <select id="home-team-id" name="home_team_id" required></select>
                </div>

                <div class="form-row">
                    <label for="away-team-id">Away team</label>
                    <select id="away-team-id" name="away_team_id" required></select>
                </div>

                <div class="form-row">
                    <label for="start-time">Start time</label>
                    <input type="datetime-local" id="start-time" name="start_time" required>
                </div>

                <div class="form-row">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="scheduled">Scheduled</option>
                        <option value="finished">Finished</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="form-row checkbox-row">
                    <label for="is-neutral-venue">Neutral venue</label>
                    <input type="checkbox" id="is-neutral-venue" name="is_neutral_venue">
                </div>

                <div id="score-fields" hidden>
                    <div class="form-row">
                        <label for="home-score">Home score</label>
                        <input type="number" id="home-score" name="home_score" min="0">
                    </div>

                    <div class="form-row">
                        <label for="away-score">Away score</label>
                        <input type="number" id="away-score" name="away_score" min="0">
                    </div>
                </div>

                <div class="form-row">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit">Create event</button>
                </div>

                <p id="create-event-message"></p>
            </form>
        </section>

        <div id="filters">
            <section id="sport-filter-section"></section>
            <section id="date-filter-section">
                <label for="date-from">Date from:</label>
                <input type="date" id="date-from">
                <label for="date-to">Date to:</label>
                <input type="date" id="date-to">
            </section>
            <button type="button" onclick="clearFilters()">Clear filters</button>
        </div>


        <section id="events-list" class="events-list">
            <p>Loading events...</p>
        </section>
        <div id="pagination" class="pagination"></div>
    </main>
</body>
</html>
